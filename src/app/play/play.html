<section class="play" aria-labelledby="play-title">
	<header class="play-header">
		<h1 id="play-title">Play</h1>
		<p class="play-progress" aria-live="polite">{{ solvedCount }}/{{ levels.length }} solved</p>
	</header>

	@for (level of levels; track level.id) {
		@let solved = isSolved(level.id);
		@let statusLabel = getSolvedStatusLabel(level.id);
		<a [routerLink]="['/play', level.id]" class="level-row">
			<span class="level-name">{{ level.name }}</span>
			<span
				class="status-chip"
				[class.status-chip-solved]="solved"
				[class.status-chip-not-solved]="!solved"
			>
				{{ statusLabel }}
			</span>
		</a>
	}

</section>
