<div class="flex h-full w-full">
	<div id="tr" class="absolute top-2.5 right-2.5"
		 style="display: flex; gap: 7px; flex-direction: column; align-items: flex-end;">
		<app-simulation-controls/>
		<app-level-info [level]="level()" style="width: 300px"/>
		<app-component-properties/>
	</div>
	<app-palette
		class="floating-panel"
		style="position: absolute"
		[restrictComponentList]="level().restrictComponentList"
		[allowedComponents]="level().allowedComponents"
	/>
	<app-palette-component-details/>
	<app-canvas/>
</div>

<app-save-panel/>
<app-settings/>

<app-tutorial/>
