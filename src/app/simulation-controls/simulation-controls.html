<div class="flex flex-row-reverse flex-wrap">
	<div class="settings-button select-none cursor-pointer">
		<span class="material-symbols-outlined">save</span>
	</div>

	<div class="settings-button select-none cursor-pointer">
		<span class="material-symbols-outlined">settings</span>
	</div>

	<div class="button select-none"
		 [style.background]="isHovered() ? (this.globals.simulation.running() ? '#a13f3f' : '#367c39') : (this.globals.simulation.running() ? '#b54747' : '#4CAF50')"
		 (mouseenter)="isHovered.set(true)"
		 (mouseleave)="isHovered.set(false)"
		 (click)="onClick()">
		<b [innerHTML]="this.globals.simulation.running() ?
	this.globals.constants.translations.simulationControls.stop : this.globals.constants.translations.simulationControls.run"></b>
		<span class="shortcut">{{ this.globals.constants.translations.simulationControls.keyboardShortcut }}</span>
	</div>

</div>
