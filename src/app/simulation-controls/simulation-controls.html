	<div class="settings-button select-none cursor-pointer">
		<span class="material-symbols-outlined" (click)="panelOpen.set(true)">save</span>

		<div class="panel" #panel [style.display]="panelOpen() ? 'flex' : 'none'">

			<label for="method"><b>Save:</b></label>

			<select name="method" id="method" (change)="onMethodChange($event)">
				<option value="local-copy">Save a copy locally</option>
				<option value="export">Export JSON</option>
				<option value="cloud-private">Save privately on cloud</option>
				<option value="cloud-public">Share publicly to cloud</option>
			</select>

			<button class="done-button">
				{{ getButtonText() }}
				<span class="material-symbols-outlined">{{ getButtonIcon() }}</span></button>
		</div>
	</div>

	<div class="button select-none"
		 [style.background]="isHovered() ? (this.globals.simulation.running() ? '#a13f3f' : '#367c39') : (this.globals.simulation.running() ? '#b54747' : '#4CAF50')"
		 (mouseenter)="isHovered.set(true)"
		 (mouseleave)="isHovered.set(false)"
		 (click)="onClick()">
		<b [innerHTML]="this.globals.simulation.running() ?
	this.globals.constants.translations.simulationControls.stop : this.globals.constants.translations.simulationControls.run"></b>
		<span class="shortcut">{{ this.globals.constants.translations.simulationControls.keyboardShortcut }}</span>
	</div>

</div>
